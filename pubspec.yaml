name: parking_manager
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  # Firebase
  firebase_core: ^2.24.2
  cloud_firestore: ^4.14.0
  firebase_storage: ^11.6.0
  firebase_messaging: ^14.7.10
  # Maps & Location
  google_maps_flutter: ^2.5.0
  geolocator: ^10.1.0
  # Notifications
  flutter_local_notifications: ^16.3.0
  # Audio
  record: ^5.0.4
  audioplayers: ^5.2.1
  # Network
  http: ^1.1.0
  # Local persistence helpers
  shared_preferences: ^2.2.2
  # Path helpers
  path_provider: ^2.1.1
  intl: ^0.18.1
  permission_handler: ^11.1.0
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  # Optional app assets can be added below.
  # assets:
  #   - assets/audio/
  #   - assets/images/
