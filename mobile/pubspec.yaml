name: parking_manager_mobile
publish_to: 'none'
description: Off-Site Parking Shuttle Transportation app for CIQ route.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  # Firebase
  firebase_core: ^4.11.0
  cloud_firestore: ^6.6.0
  firebase_storage: ^13.4.3
  firebase_messaging: ^16.4.1
  # Maps & Location
  google_maps_flutter: ^2.5.0
  geolocator: ^14.0.3
  # Notifications
  flutter_local_notifications: ^22.0.1
  # Audio
  record: ^7.1.1
  audioplayers: ^6.8.1
  # Network
  http: ^1.1.0
  url_launcher: ^6.2.4
  # Utilities
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1
  intl: ^0.20.3
  permission_handler: ^12.0.3
  uuid: ^4.2.2
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  # Optional: uncomment to add local assets (e.g. alert sounds, icons).
  # assets:
  #   - assets/audio/
  #   - assets/images/
