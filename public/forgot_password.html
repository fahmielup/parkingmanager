<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Terlupa Kata Laluan - AMD Parking Manager</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      background: radial-gradient(circle at 80% 10%, rgba(212, 175, 55, 0.12) 0%, transparent 40%),
                  radial-gradient(circle at 10% 90%, rgba(30, 58, 138, 0.25) 0%, transparent 45%),
                  linear-gradient(145deg, #0b1c3d 0%, #132a5f 50%, #1a3b82 100%);
      position: relative;
      font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', Arial, sans-serif;
    }
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url('uploads/logo_amd.png');
      background-repeat: no-repeat;
      background-position: center;
      background-size: 520px;
      opacity: 0.035;
      pointer-events: none;
    }
    .gold-line {
      position: absolute;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.7), rgba(245, 226, 138, 0.9), rgba(212, 175, 55, 0.7), transparent);
      opacity: 0.8;
    }
    .gold-line.top { top: 0; }
    .gold-line.bottom { bottom: 0; }
    .login-card {
      background: rgba(255, 255, 255, 0.98);
      padding: 40px 44px;
      border-radius: 16px;
      box-shadow: 0 22px 60px -12px rgba(0, 0, 0, 0.45), 0 0 0 1px rgba(212, 175, 55, 0.25);
      width: 100%;
      max-width: 420px;
      text-align: center;
      position: relative;
      z-index: 10;
      border-top: 3px solid #d4af37;
      animation: cardIn 0.8s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .login-logo {
      width: 80px;
      height: 80px;
      object-fit: contain;
      margin: 0 auto 12px;
      display: block;
      filter: drop-shadow(0 4px 10px rgba(11, 28, 61, 0.25));
    }
    .login-brand {
      margin-bottom: 24px;
    }
    .login-brand h1 {
      margin: 0;
      font-size: 20px;
      color: #12275c;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      font-weight: 800;
    }
    .login-brand span {
      display: block;
      font-size: 11px;
      color: #b08d1e;
      letter-spacing: 2.8px;
      text-transform: uppercase;
      margin-top: 4px;
      font-weight: 600;
    }
    .login-divider {
      height: 2px;
      width: 60px;
      margin: 12px auto 0;
      background: linear-gradient(90deg, transparent, #d4af37, transparent);
    }
    .form-title {
      font-size: 18px;
      font-weight: 700;
      color: #12275c;
      margin: 0 0 8px;
    }
    .form-desc {
      font-size: 13px;
      color: #64748b;
      margin-bottom: 24px;
      line-height: 1.5;
    }
    .login-form .form-group {
      text-align: left;
      margin-bottom: 18px;
    }
    .login-form input {
      width: 100%;
      border: 1px solid #d1d5db;
      background: #fafbfc;
      transition: all 0.2s ease;
    }
    .login-form input:focus {
      border-color: #d4af37;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.15);
      outline: none;
    }
    .login-form button {
      width: 100%;
      margin-top: 6px;
      background: linear-gradient(135deg, #12275c, #1e3a8a);
      border: none;
      letter-spacing: 1px;
      font-weight: 700;
      padding: 14px 24px;
      border-radius: 8px;
      transition: all 0.2s ease;
      cursor: pointer;
    }
    .login-form button:hover {
      background: linear-gradient(135deg, #1e3a8a, #2649aa);
      box-shadow: 0 10px 24px rgba(30, 58, 138, 0.35);
    }
    .message {
      margin-top: 14px;
      font-size: 14px;
      min-height: 20px;
    }
    .message.success { color: #15803d; }
    .message.error { color: #dc2626; }
    .back-link {
      margin-top: 18px;
      font-size: 13px;
    }
    .back-link a {
      color: #b08d1e;
      text-decoration: none;
      font-weight: 600;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(18px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    @media (max-width: 520px) {
      .login-card { margin: 0 16px; padding: 34px 28px; }
      .login-logo { width: 70px; height: 70px; }
      .login-brand h1 { font-size: 17px; }
    }
  </style>
</head>
<body>
  <div class="gold-line top"></div>
  <div class="gold-line bottom"></div>

  <div class="login-card">
    <img src="uploads/logo_amd.png" class="login-logo" alt="Company Logo">
    <div class="login-brand">
      <h1>AMD Parking</h1>
      <span>Amieeco Duff Enterprises</span>
      <div class="login-divider"></div>
    </div>

    <h3 class="form-title">Terlupa Kata Laluan</h3>
    <p class="form-desc">
      Masukkan nama pengguna. Link reset akan dihantar ke
      <strong>amieecompany@gmail.com</strong> jika akaun wujud.
    </p>

    <form id="forgot-form" class="login-form">
      <div class="form-group">
        <label for="username">Nama Pengguna</label>
        <input type="text" id="username" name="username" placeholder="Contoh: admin" required autofocus autocomplete="username">
      </div>
      <button type="submit" class="btn">Hantar Link Reset</button>
      <div class="message" id="forgot-message"></div>
    </form>

    <div class="back-link">
      <a href="login.html">Kembali ke Log Masuk</a>
    </div>
  </div>

  <script src="config.js"></script>
  <script>
    document.getElementById('forgot-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = e.target.username.value.trim();
      const messageDiv = document.getElementById('forgot-message');
      messageDiv.textContent = '';
      messageDiv.className = 'message';

      if (!username) {
        messageDiv.textContent = 'Sila masukkan nama pengguna.';
        messageDiv.classList.add('error');
        return;
      }

      const API_BASE_URL = window.API_BASE_URL || '';
      try {
        const res = await fetch(`${API_BASE_URL}/api/forgot-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username })
        });
        const data = await res.json();
        if (data.success) {
          messageDiv.textContent = 'Jika nama pengguna wujud, link reset telah dihantar ke amieecompany@gmail.com.';
          messageDiv.classList.add('success');
          e.target.reset();
        } else {
          messageDiv.textContent = data.error || 'Ralat memproses permintaan';
          messageDiv.classList.add('error');
        }
      } catch (err) {
        messageDiv.textContent = 'Ralat sambungan. Sila cuba lagi.';
        messageDiv.classList.add('error');
      }
    });
  </script>
</body>
</html>
