<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - AMD Parking Manager</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      background: radial-gradient(circle at 80% 10%, rgba(212, 175, 55, 0.12) 0%, transparent 40%),
                  radial-gradient(circle at 10% 90%, rgba(30, 58, 138, 0.25) 0%, transparent 45%),
                  linear-gradient(145deg, #0b1c3d 0%, #132a5f 50%, #1a3b82 100%);
      position: relative;
      font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', Arial, sans-serif;
    }
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url('uploads/logo_amd.png');
      background-repeat: no-repeat;
      background-position: center;
      background-size: 520px;
      opacity: 0.035;
      pointer-events: none;
    }
    .gold-line {
      position: absolute;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.7), rgba(245, 226, 138, 0.9), rgba(212, 175, 55, 0.7), transparent);
      opacity: 0.8;
    }
    .gold-line.top { top: 0; }
    .gold-line.bottom { bottom: 0; }
    .login-card {
      background: rgba(255, 255, 255, 0.98);
      padding: 40px 44px;
      border-radius: 16px;
      box-shadow: 0 22px 60px -12px rgba(0, 0, 0, 0.45), 0 0 0 1px rgba(212, 175, 55, 0.25);
      width: 100%;
      max-width: 420px;
      text-align: center;
      position: relative;
      z-index: 10;
      border-top: 3px solid #d4af37;
      animation: cardIn 0.8s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .login-logo {
      width: 100px;
      height: 100px;
      object-fit: contain;
      margin: 0 auto 12px;
      display: block;
      filter: drop-shadow(0 4px 10px rgba(11, 28, 61, 0.25));
    }
    .login-brand {
      margin-bottom: 26px;
    }
    .login-brand h1 {
      margin: 0;
      font-size: 21px;
      color: #12275c;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      font-weight: 800;
    }
    .login-brand span {
      display: block;
      font-size: 11px;
      color: #b08d1e;
      letter-spacing: 2.8px;
      text-transform: uppercase;
      margin-top: 5px;
      font-weight: 600;
    }
    .login-divider {
      height: 2px;
      width: 60px;
      margin: 12px auto 0;
      background: linear-gradient(90deg, transparent, #d4af37, transparent);
    }
    .login-form .form-group {
      text-align: left;
      margin-bottom: 18px;
    }
    .login-form input {
      width: 100%;
      border: 1px solid #d1d5db;
      background: #fafbfc;
      transition: all 0.2s ease;
    }
    .login-form input:focus {
      border-color: #d4af37;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.15);
      outline: none;
    }
    .login-form button {
      width: 100%;
      margin-top: 6px;
      background: linear-gradient(135deg, #12275c, #1e3a8a);
      border: none;
      letter-spacing: 1px;
      font-weight: 700;
      padding: 14px 24px;
      border-radius: 8px;
      transition: all 0.2s ease;
      cursor: pointer;
    }
    .login-form button:hover {
      background: linear-gradient(135deg, #1e3a8a, #2649aa);
      box-shadow: 0 10px 24px rgba(30, 58, 138, 0.35);
    }
    .error-msg {
      color: var(--danger, #dc2626);
      font-size: 14px;
      margin-top: 12px;
      min-height: 20px;
    }
    .hint {
      margin-top: 18px;
      font-size: 12px;
      color: var(--text-light, #6b7280);
    }

    /* Clock widget */
    .clock-widget {
      position: absolute;
      top: 26px;
      left: 28px;
      z-index: 20;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(212, 175, 55, 0.35);
      border-radius: 12px;
      padding: 14px 22px;
      text-align: left;
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.2);
      animation: cardIn 0.8s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .clock-time {
      font-size: 28px;
      font-weight: 700;
      color: #12275c;
      letter-spacing: 1.5px;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }
    .clock-time .clock-seconds {
      font-size: 16px;
      color: #b08d1e;
      font-weight: 600;
      margin-left: 2px;
    }
    .clock-date {
      margin-top: 5px;
      font-size: 12px;
      color: #64748b;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      font-weight: 600;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(18px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    @media (max-width: 520px) {
      .clock-widget {
        top: 16px;
        left: 16px;
        padding: 12px 18px;
      }
      .clock-time { font-size: 22px; }
      .clock-date { font-size: 11px; }
      .login-card { margin: 0 16px; padding: 34px 28px; }
      .login-logo { width: 84px; height: 84px; }
      .login-brand h1 { font-size: 18px; }
    }
  </style>
</head>
<body>
  <div class="gold-line top"></div>
  <div class="gold-line bottom"></div>

  <div class="clock-widget">
    <div class="clock-time"><span id="clock-hm">--:--</span><span class="clock-seconds" id="clock-s">:--</span></div>
    <div class="clock-date" id="clock-date">Memuatkan...</div>
  </div>

  <div class="login-card">
    <img src="uploads/logo_amd.png" class="login-logo" alt="Company Logo">
    <div class="login-brand">
      <h1>AMD Parking</h1>
      <span>Amieeco Duff Enterprises</span>
      <div class="login-divider"></div>
    </div>
    <form class="login-form" id="login-form">
      <div class="form-group">
        <label for="username">Nama Pengguna</label>
        <input type="text" id="username" name="username" placeholder="Username" required autocomplete="username">
      </div>
      <div class="form-group">
        <label for="password">Kata Laluan</label>
        <input type="password" id="password" name="password" placeholder="Password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn">Log Masuk</button>
      <div class="error-msg" id="error-msg"></div>
      <div class="hint">Sistem Pengurusan Parking Profesional</div>
    </form>
  </div>

  <script src="config.js"></script>
  <script>
    (function startClock() {
      const clockHm = document.getElementById('clock-hm');
      const clockS = document.getElementById('clock-s');
      const clockDate = document.getElementById('clock-date');
      const days = ['Ahad', 'Isnin', 'Selasa', 'Rabu', 'Khamis', 'Jumaat', 'Sabtu'];
      const months = ['Januari', 'Februari', 'Mac', 'April', 'Mei', 'Jun', 'Julai', 'Ogos', 'September', 'Oktober', 'November', 'Disember'];
      function update() {
        const now = new Date();
        const h = String(now.getHours()).padStart(2, '0');
        const m = String(now.getMinutes()).padStart(2, '0');
        const s = String(now.getSeconds()).padStart(2, '0');
        clockHm.textContent = `${h}:${m}`;
        clockS.textContent = `:${s}`;
        clockDate.textContent = `${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
      }
      update();
      setInterval(update, 1000);
    })();

    document.getElementById('login-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('error-msg');
      const API_BASE_URL = window.API_BASE_URL || '';
      fetch(`${API_BASE_URL}/api/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      })
      .then(r => r.json())
      .then(data => {
        if (data.success) {
          localStorage.setItem('jwt_token', data.token);
          window.location.href = 'index.html';
        } else {
          errorMsg.textContent = data.error || 'Nama pengguna atau kata laluan salah.';
        }
      })
      .catch(() => {
        errorMsg.textContent = 'Ralat rangkaian. Sila cuba lagi.';
      });
    });
  </script>
</body>
</html>
